<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recette — Recette du Monde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-canvas">

  <!-- Navigation -->
  <nav class="no-print fixed top-0 left-0 right-0 z-50 bg-canvas/90 backdrop-blur-md border-b border-hairline-soft">
    <div class="max-w-[1440px] mx-auto px-6 lg:px-12 h-16 flex items-center justify-between">
      <a href="index.html" class="font-display text-3xl tracking-wide text-ink uppercase" data-i18n="site_name">Recette du Monde</a>
      <div class="flex items-center gap-3">
        <button id="print-btn" class="no-print px-4 py-2 rounded-full border border-hairline text-sm font-medium text-ink hover:bg-ink hover:text-on-primary transition-all" data-i18n="btn_print">Imprimer</button>
        <button id="lang-toggle" class="px-4 py-2 rounded-full bg-ink text-on-primary text-xs font-medium uppercase tracking-wider hover:bg-charcoal transition-colors">
          <span id="lang-label">FR</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Recipe hero — full bleed -->
  <section class="relative h-[60vh] min-h-[400px] mt-16">
    <img id="recipe-image" src="" alt="" class="recipe-hero-img absolute inset-0 w-full h-full object-cover">
    <div class="absolute inset-0 hero-gradient"></div>
    <div class="absolute bottom-0 left-0 right-0 p-6 lg:p-12 max-w-[1440px] mx-auto">
      <h1 id="recipe-title" class="font-display text-[clamp(2.5rem,8vw,5rem)] leading-[0.9] text-on-dark uppercase tracking-tight"></h1>
      <p id="recipe-description" class="mt-3 text-on-dark/80 text-lg max-w-xl"></p>
    </div>
  </section>

  <!-- Meta badges -->
  <section class="bg-ink">
    <div class="max-w-[1440px] mx-auto px-6 lg:px-12 py-6">
      <div id="recipe-meta" class="flex flex-wrap gap-4">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>

  <!-- Content: Ingredients + Steps -->
  <main class="recipe-detail max-w-[1080px] mx-auto px-6 lg:px-12 py-12 lg:py-16">
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-16 lg:gap-20">
      <!-- Ingredients -->
      <section>
        <h2 class="font-display text-3xl uppercase text-ink mb-6" data-i18n="ingredients_title">Ingrédients</h2>

        <!-- Serving calculator -->
        <div class="mb-8 p-5 bg-cloud rounded-sm">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium text-ink" data-i18n="servings_label">Personnes</span>
            <div class="flex items-center gap-2">
              <button id="servings-minus" class="w-8 h-8 rounded-full bg-ink text-on-primary text-lg font-bold flex items-center justify-center hover:bg-charcoal transition-colors">−</button>
              <span id="servings-count" class="w-8 text-center font-bold text-ink text-lg">4</span>
              <button id="servings-plus" class="w-8 h-8 rounded-full bg-ink text-on-primary text-lg font-bold flex items-center justify-center hover:bg-charcoal transition-colors">+</button>
            </div>
          </div>
          <div id="portions-display" class="text-xs text-mute mb-3"></div>
          <div id="calc-info" class="text-xs text-mute" data-i18n="calc_info">Cliquez sur un ingrédient pour calculer</div>
          <div id="calc-result" class="hidden mt-2 text-sm font-medium text-primary"></div>
          <button id="calc-reset" class="hidden mt-2 text-xs text-mute underline hover:text-ink transition-colors" data-i18n="calc_reset">Réinitialiser</button>
        </div>

        <ul id="recipe-ingredients" class="space-y-0">
          <!-- Rendered by JS -->
        </ul>
      </section>

      <!-- Steps -->
      <section>
        <h2 class="font-display text-3xl uppercase text-ink mb-8" data-i18n="steps_title">Étapes</h2>
        <div id="recipe-steps" class="space-y-0">
          <!-- Rendered by JS -->
        </div>
      </section>
    </div>

    <!-- Back -->
    <div class="no-print mt-16 pt-8 border-t border-hairline-soft">
      <a href="index.html" class="inline-block px-6 py-3 rounded-full bg-ink text-on-primary font-medium text-sm hover:bg-charcoal transition-colors" data-i18n="back_home">← Retour aux recettes</a>
    </div>
  </main>

  <!-- Timer widget -->
  <div id="timer-widget" class="no-print hidden fixed bottom-6 right-6 bg-ink text-on-dark rounded-lg p-4 w-72 z-50 border border-charcoal">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-sm font-semibold uppercase tracking-wider" data-i18n="timer_title">Minuteurs</h3>
      <button id="timer-close" class="text-stone hover:text-on-dark text-lg leading-none">&times;</button>
    </div>
    <div id="timer-list" class="space-y-2 max-h-48 overflow-y-auto">
      <!-- Timers rendered by JS -->
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/recipe-detail.js"></script>
</body>
</html>
